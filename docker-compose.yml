services:
  bilibili-copilot-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bilibili-copilot-web
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - DB_PATH=/data/chat.db
    volumes:
      - ./data:/data
    extra_hosts:
      - "zyfun-ubuntu26:host-gateway"
